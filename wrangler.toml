name = "reverse-cyritex"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# ----------------------------------------------------------------------
# Target upstream configuration
# ----------------------------------------------------------------------
# The Worker reads a single env var, TARGET_URL, which is the full upstream
# URL the Worker should proxy to (e.g. "https://100180.secvision.cloud" or
# "http://example.com:8080/path"). The default below is used when the var
# is not set in the Cloudflare dashboard. Override per-environment with:
#
#   wrangler secret put TARGET_URL
#
# or by editing the Worker's environment variables in the Cloudflare
# dashboard under Workers & Pages -> reverse-cyritex -> Settings ->
# Variables and Secrets.
# ----------------------------------------------------------------------
[vars]
TARGET_URL = "https://100180.secvision.cloud"

[observability]
[observability.logs]
enabled = true
invocation_logs = true
